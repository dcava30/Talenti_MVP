services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-talenti}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-talenti}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - talenti-network

  # Main Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${BACKEND_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/talenti}
      - JWT_SECRET=${JWT_SECRET:-dev-docker-secret}
      - MODEL_SERVICE_1_URL=http://model-service-1:8001
      - MODEL_SERVICE_2_URL=http://model-service-2:8002
      - ACS_WORKER_URL=http://acs-worker:8000
      - ACS_WORKER_SHARED_SECRET=${ACS_WORKER_SHARED_SECRET:-dev-acs-worker-secret}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - AZURE_ACS_CONNECTION_STRING=${AZURE_ACS_CONNECTION_STRING}
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT}
      - AZURE_STORAGE_ACCOUNT_KEY=${AZURE_STORAGE_ACCOUNT_KEY}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER}
      - BACKGROUND_WORKER_POLL_INTERVAL_SECONDS=${BACKGROUND_WORKER_POLL_INTERVAL_SECONDS:-2.0}
      - AUTO_SCORE_INTERVIEWS=${AUTO_SCORE_INTERVIEWS:-false}
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      model-service-1:
        condition: service_started
      model-service-2:
        condition: service_started
      acs-worker:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - talenti-network

  # Model Service 1 (e.g., Sentiment/Communication Analysis)
  model-service-1:
    build:
      context: ./model-service-1
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=model-1
      - LOG_LEVEL=INFO
      - WORKERS=2
    volumes:
      - ./model-service-1/app:/app/app:ro
      - model-1-cache:/app/model_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Models may take longer to load
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    networks:
      - talenti-network

  # Model Service 2 (e.g., Technical/Competency Scoring)
  model-service-2:
    build:
      context: ./model-service-2
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MODEL_NAME=model-2
      - LOG_LEVEL=INFO
      - WORKERS=2
    volumes:
      - ./model-service-2/app:/app/app:ro
      - model-2-cache:/app/model_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    networks:
      - talenti-network

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker_main"]
    environment:
      - DATABASE_URL=${BACKEND_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/talenti}
      - JWT_SECRET=${JWT_SECRET:-dev-docker-secret}
      - MODEL_SERVICE_1_URL=http://model-service-1:8001
      - MODEL_SERVICE_2_URL=http://model-service-2:8002
      - ACS_WORKER_URL=http://acs-worker:8000
      - ACS_WORKER_SHARED_SECRET=${ACS_WORKER_SHARED_SECRET:-dev-acs-worker-secret}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - AZURE_ACS_CONNECTION_STRING=${AZURE_ACS_CONNECTION_STRING}
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT}
      - AZURE_STORAGE_ACCOUNT_KEY=${AZURE_STORAGE_ACCOUNT_KEY}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER}
      - BACKGROUND_WORKER_POLL_INTERVAL_SECONDS=${BACKGROUND_WORKER_POLL_INTERVAL_SECONDS:-2.0}
      - AUTO_SCORE_INTERVIEWS=${AUTO_SCORE_INTERVIEWS:-false}
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
      model-service-1:
        condition: service_started
      model-service-2:
        condition: service_started
      acs-worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - talenti-network

  # Internal ACS worker service (no public ingress in cloud topology)
  acs-worker:
    build:
      context: ./python-acs-service
      dockerfile: Dockerfile
    environment:
      - ACS_CONNECTION_STRING=${AZURE_ACS_CONNECTION_STRING}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - RECORDING_CONTAINER=${RECORDING_CONTAINER:-recordings}
      - BACKEND_INTERNAL_URL=http://backend:8000
      - ACS_WORKER_SHARED_SECRET=${ACS_WORKER_SHARED_SECRET:-dev-acs-worker-secret}
      - ACS_CALLBACK_URL=${PUBLIC_BASE_URL:-http://localhost:8000}/api/v1/acs/webhook
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - talenti-network

  # Optional: Frontend (if you want to run everything together)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - VITE_API_BASE_URL=http://localhost:8000
  #   volumes:
  #     - ./src:/app/src:ro
  #   networks:
  #     - talenti-network

networks:
  talenti-network:
    driver: bridge

volumes:
  postgres-data:
  model-1-cache:
  model-2-cache:
