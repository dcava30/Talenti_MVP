name: deploy-dev
run-name: deploy-dev (${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }})

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full 40-character commit SHA from main to deploy to dev
        required: true
        type: string
  workflow_run:
    workflows:
      - ci-main
    types:
      - completed

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  actions: read
  id-token: write
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      BACKEND_APP: ${{ vars.BACKEND_APP }}
      BACKEND_WORKER_APP: ${{ vars.BACKEND_WORKER_APP }}
      MODEL1_APP: ${{ vars.MODEL1_APP }}
      MODEL2_APP: ${{ vars.MODEL2_APP }}
      ACS_WORKER_APP: ${{ vars.ACS_WORKER_APP }}
      STATIC_WEB_APP_NAME: ${{ vars.STATIC_WEB_APP_NAME }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      MODEL1_IMAGE: ${{ vars.MODEL1_IMAGE_REF }}
      MODEL2_IMAGE: ${{ vars.MODEL2_IMAGE_REF }}
    steps:
      - name: Resolve source sha
        id: source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ inputs.source_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ steps.source.outputs.sha }}
          fetch-depth: 0

      - name: Validate manual dispatch source SHA provenance
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source_sha="${{ steps.source.outputs.sha }}"

          if ! [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "inputs.source_sha must be a full 40-character lowercase git SHA."
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$source_sha" origin/main; then
            echo "source_sha must exist on the main branch history."
            exit 1
          fi

          gh run list --workflow ci-main.yml --branch main --limit 200 --json headSha,conclusion,status > ci_main_runs.json
          python -c "import json; from pathlib import Path; source_sha='${{ steps.source.outputs.sha }}'; runs=json.loads(Path('ci_main_runs.json').read_text(encoding='utf-8')); ok=any(run.get('headSha') == source_sha and run.get('status') == 'completed' and run.get('conclusion') == 'success' for run in runs); raise SystemExit(0 if ok else f'No successful ci-main run found for source_sha={source_sha}.')"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: |
          az extension add --name containerapp --upgrade
          az extension add --name staticwebapp --upgrade

      - name: Preflight Azure resources
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_RESOURCE_GROUP
            ACR_NAME
            BACKEND_APP
            BACKEND_WORKER_APP
            MODEL1_APP
            MODEL2_APP
            ACS_WORKER_APP
            STATIC_WEB_APP_NAME
            KEY_VAULT_NAME
            MODEL1_IMAGE
            MODEL2_IMAGE
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          done

          az group show --name "$AZURE_RESOURCE_GROUP" > /dev/null
          az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az keyvault show --name "$KEY_VAULT_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$BACKEND_WORKER_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$MODEL1_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$MODEL2_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$ACS_WORKER_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az staticwebapp show --name "$STATIC_WEB_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null

      - name: Enforce infra-dev success when infra changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target_sha="${{ steps.source.outputs.sha }}"

          if git rev-parse "${target_sha}^1" >/dev/null 2>&1; then
            changed_files=$(git diff --name-only "${target_sha}^1" "${target_sha}")
          else
            changed_files=$(git diff-tree --root --no-commit-id --name-only -r "${target_sha}")
          fi

          if echo "$changed_files" | grep -Eq '^(infra/dev/|infra/modules/|\.github/workflows/infra-dev\.yml$)'; then
            echo "Infra change detected; waiting for matching infra-dev result for commit ${{ steps.source.outputs.sha }}"
            timeout_seconds=1200
            interval_seconds=20
            elapsed_seconds=0

            while true; do
              gh run list --workflow infra-dev.yml --branch main --limit 200 --json headSha,conclusion,status > infra_runs.json

              result=$(python -c "import json; from pathlib import Path; target='${{ steps.source.outputs.sha }}'; runs=json.loads(Path('infra_runs.json').read_text(encoding='utf-8')); matched=[run for run in runs if run.get('headSha') == target]; print('missing' if not matched else 'success' if any(run.get('status') == 'completed' and run.get('conclusion') == 'success' for run in matched) else f\"failed:{next(run.get('conclusion') for run in matched if run.get('status') == 'completed' and run.get('conclusion') not in ('success', None))}\" if any(run.get('status') == 'completed' and run.get('conclusion') not in ('success', None) for run in matched) else 'pending')")

              case "$result" in
                success)
                  echo "Found successful infra-dev run for $target_sha."
                  break
                  ;;
                failed:*)
                  echo "Matching infra-dev run failed for $target_sha (${result#failed:})."
                  exit 1
                  ;;
                pending|missing)
                  if (( elapsed_seconds >= timeout_seconds )); then
                    echo "Timed out waiting for infra-dev completion for $target_sha."
                    exit 1
                  fi
                  echo "infra-dev state=$result for $target_sha; retrying in ${interval_seconds}s (${elapsed_seconds}/${timeout_seconds}s elapsed)"
                  sleep "$interval_seconds"
                  elapsed_seconds=$((elapsed_seconds + interval_seconds))
                  ;;
                *)
                  echo "Unexpected infra-dev state: $result"
                  exit 1
                  ;;
              esac
            done
          else
            echo "No infra changes detected for this SHA."
          fi

      - name: Validate pinned model image digests
        run: |
          set -euo pipefail

          model1_pattern="^${ACR_NAME}\\.azurecr\\.io/talenti/model-service-1@sha256:[a-f0-9]{64}$"
          model2_pattern="^${ACR_NAME}\\.azurecr\\.io/talenti/model-service-2@sha256:[a-f0-9]{64}$"

          if ! [[ "$MODEL1_IMAGE" =~ $model1_pattern ]]; then
            echo "MODEL1_IMAGE is invalid: $MODEL1_IMAGE"
            exit 1
          fi

          if ! [[ "$MODEL2_IMAGE" =~ $model2_pattern ]]; then
            echo "MODEL2_IMAGE is invalid: $MODEL2_IMAGE"
            exit 1
          fi

      - name: Resolve immutable app images for source SHA
        run: |
          set -euo pipefail
          source_sha="${{ steps.source.outputs.sha }}"

          backend_digest=$(az acr manifest show-metadata --registry "$ACR_NAME" --name "talenti/backend:${source_sha}" --query digest -o tsv)
          acs_digest=$(az acr manifest show-metadata --registry "$ACR_NAME" --name "talenti/acs-worker:${source_sha}" --query digest -o tsv)

          if [[ -z "$backend_digest" || -z "$acs_digest" ]]; then
            echo "Missing immutable backend or acs-worker image for $source_sha in ACR."
            exit 1
          fi

          echo "BACKEND_IMAGE=$ACR_NAME.azurecr.io/talenti/backend@${backend_digest}" >> "$GITHUB_ENV"
          echo "ACS_IMAGE=$ACR_NAME.azurecr.io/talenti/acs-worker@${acs_digest}" >> "$GITHUB_ENV"

      - name: Run backend migrations (single job)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
          export DATABASE_URL="${{ secrets.BACKEND_DATABASE_URL }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          python backend/scripts/run_migrations.py

      - name: Deploy internal services
        run: |
          az containerapp update --name "$BACKEND_WORKER_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$BACKEND_IMAGE"
          az containerapp update --name "$MODEL1_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$MODEL1_IMAGE"
          az containerapp update --name "$MODEL2_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$MODEL2_IMAGE"
          az containerapp update --name "$ACS_WORKER_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$ACS_IMAGE"

      - name: Deploy backend
        run: az containerapp update --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$BACKEND_IMAGE"

      - name: Build frontend artifact
        run: |
          npm ci
          npm run build

      - name: Resolve frontend deployment token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.apiKey \
            -o tsv)
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          output_location: "/"
          skip_app_build: true

      - name: Resolve smoke test URLs
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name "$BACKEND_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          FRONTEND_HOST=$(az staticwebapp show \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query defaultHostname \
            -o tsv)

          echo "BACKEND_HEALTH_URL=https://${BACKEND_FQDN}/health" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=https://${FRONTEND_HOST}" >> "$GITHUB_ENV"

      - name: Smoke check backend health
        run: curl -fsS "$BACKEND_HEALTH_URL"

      - name: Smoke check frontend availability
        run: curl -fsS "$FRONTEND_URL" > /dev/null
