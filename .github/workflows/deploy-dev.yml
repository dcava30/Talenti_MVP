name: deploy-dev

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "python-acs-service/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-dev.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_RESOURCE_GROUP: rg-talenti-dev-aue
      ACR_NAME: acrtalentidev
      BACKEND_APP: ca-backend-dev
      MODEL1_APP: ca-model1-dev
      MODEL2_APP: ca-model2-dev
      ACS_WORKER_APP: ca-acs-worker-dev
      MODEL1_IMAGE: ${{ vars.DEV_MODEL1_IMAGE_REF }}
      MODEL2_IMAGE: ${{ vars.DEV_MODEL2_IMAGE_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Validate pinned model image digests
        run: |
          set -euo pipefail

          if [[ -z "${MODEL1_IMAGE:-}" || -z "${MODEL2_IMAGE:-}" ]]; then
            echo "DEV_MODEL1_IMAGE_REF and DEV_MODEL2_IMAGE_REF must be set in the 'dev' environment variables."
            exit 1
          fi

          model1_pattern='^acrtalentidev\.azurecr\.io/talenti/model-service-1@sha256:[a-f0-9]{64}$'
          model2_pattern='^acrtalentidev\.azurecr\.io/talenti/model-service-2@sha256:[a-f0-9]{64}$'

          if ! [[ "$MODEL1_IMAGE" =~ $model1_pattern ]]; then
            echo "MODEL1_IMAGE is invalid: $MODEL1_IMAGE"
            exit 1
          fi

          if ! [[ "$MODEL2_IMAGE" =~ $model2_pattern ]]; then
            echo "MODEL2_IMAGE is invalid: $MODEL2_IMAGE"
            exit 1
          fi

          docker manifest inspect "$MODEL1_IMAGE" > /dev/null
          docker manifest inspect "$MODEL2_IMAGE" > /dev/null

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="$ACR_NAME.azurecr.io/talenti/backend:${GITHUB_SHA}"
          docker build -t "$BACKEND_IMAGE" backend
          docker push "$BACKEND_IMAGE"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Build and push acs-worker image
        run: |
          ACS_IMAGE="$ACR_NAME.azurecr.io/talenti/acs-worker:${GITHUB_SHA}"
          docker build -t "$ACS_IMAGE" python-acs-service
          docker push "$ACS_IMAGE"
          echo "ACS_IMAGE=$ACS_IMAGE" >> $GITHUB_ENV

      - name: Run backend migrations (single job)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
          export DATABASE_URL="${{ secrets.BACKEND_DATABASE_URL }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          python backend/scripts/run_migrations.py

      - name: Deploy internal services
        run: |
          az containerapp update --name "$MODEL1_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$MODEL1_IMAGE"
          az containerapp update --name "$MODEL2_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$MODEL2_IMAGE"
          az containerapp update --name "$ACS_WORKER_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$ACS_IMAGE"

      - name: Deploy backend
        run: az containerapp update --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$BACKEND_IMAGE"

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"

      - name: Smoke check backend health
        run: |
          curl -f "${{ secrets.DEV_BACKEND_HEALTH_URL }}"
