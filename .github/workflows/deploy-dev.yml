name: deploy-dev

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  actions: read
  id-token: write
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      BACKEND_APP: ${{ vars.BACKEND_APP }}
      STATIC_WEB_APP_NAME: ${{ vars.STATIC_WEB_APP_NAME }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      DEV_FRONTEND_ORIGIN: ${{ vars.DEV_FRONTEND_ORIGIN }}
      DEV_API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}
    steps:
      - name: Resolve source sha
        id: source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: |
          az extension add --name containerapp --upgrade
          az extension add --name staticwebapp --upgrade

      - name: Preflight Azure resources
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_RESOURCE_GROUP
            ACR_NAME
            BACKEND_APP
            STATIC_WEB_APP_NAME
            KEY_VAULT_NAME
            DEV_FRONTEND_ORIGIN
            DEV_API_BASE_URL
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          done

          az group show --name "$AZURE_RESOURCE_GROUP" > /dev/null
          az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az keyvault show --name "$KEY_VAULT_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az containerapp show --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null
          az staticwebapp show --name "$STATIC_WEB_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" > /dev/null

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="$ACR_NAME.azurecr.io/talenti/backend:${{ steps.source.outputs.sha }}"
          docker build -t "$BACKEND_IMAGE" backend
          docker push "$BACKEND_IMAGE"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Run backend migrations (single job)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
          export DATABASE_URL="${{ secrets.BACKEND_DATABASE_URL }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          python backend/scripts/run_migrations.py

      - name: Deploy backend
        run: az containerapp update --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" --image "$BACKEND_IMAGE"

      - name: Configure backend runtime
        run: |
          set -euo pipefail
          ALLOWED_ORIGINS_JSON=$(printf '["%s"]' "$DEV_FRONTEND_ORIGIN")
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              JWT_SECRET=secretref:jwt-secret \
              ENVIRONMENT=development \
              ALLOWED_ORIGINS="$ALLOWED_ORIGINS_JSON" \
              MODEL_SERVICE_1_URL= \
              MODEL_SERVICE_2_URL= \
              ACS_WORKER_URL= \
              ACS_WORKER_SHARED_SECRET=secretref:acs-worker-shared-secret \
              PUBLIC_BASE_URL="$DEV_API_BASE_URL" \
              AZURE_ACS_CONNECTION_STRING=secretref:azure-acs-connection-string \
              AZURE_SPEECH_KEY=secretref:azure-speech-key \
              AZURE_OPENAI_ENDPOINT=secretref:azure-openai-endpoint \
              AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key \
              AZURE_STORAGE_ACCOUNT=secretref:azure-storage-account \
              AZURE_STORAGE_ACCOUNT_KEY=secretref:azure-storage-account-key \
              AZURE_STORAGE_CONTAINER=uploads \
              BACKGROUND_WORKER_POLL_INTERVAL_SECONDS=2.0 \
              AUTO_SCORE_INTERVIEWS=false \
              ENABLE_LIVE_SCORING=false \
              ENABLE_ACS_CALL_AUTOMATION=false

      - name: Build frontend artifact
        run: |
          export VITE_API_BASE_URL="$DEV_API_BASE_URL"
          npm ci
          npm run build

      - name: Resolve frontend deployment token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.apiKey \
            -o tsv)
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          output_location: "/"
          skip_app_build: true

      - name: Resolve smoke test URLs
        run: |
          echo "BACKEND_HEALTH_URL=${DEV_API_BASE_URL%/}/health" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=${DEV_FRONTEND_ORIGIN%/}" >> "$GITHUB_ENV"

      - name: Smoke check backend health
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7 8; do
            if curl -fsS "$BACKEND_HEALTH_URL" > /dev/null; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          curl -fsS "$BACKEND_HEALTH_URL"

      - name: Smoke check frontend availability
        run: curl -fsS "$FRONTEND_URL" > /dev/null
