name: pr-security-iac

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: pr-security-iac-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  dependency-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Scan for secrets (gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --verbose --redact --exit-code 1

      - name: Audit npm dependencies (high/critical gate)
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Audit backend dependencies (high/critical gate)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -e backend
          pip-audit --desc --strict

      - name: Audit ACS dependencies (high/critical gate)
        run: |
          python -m pip install -r python-acs-service/requirements.txt
          pip-audit --desc --strict -r python-acs-service/requirements.txt

  containers-and-iac:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install checkov
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          curl -sSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Dockerfile lint
        run: |
          hadolint backend/Dockerfile
          hadolint python-acs-service/Dockerfile

      - name: Build local images for scan
        run: |
          docker build -t local/backend-pr-scan:${{ github.sha }} backend
          docker build -t local/acs-pr-scan:${{ github.sha }} python-acs-service

      - name: Image vulnerability scan (high/critical gate)
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed local/backend-pr-scan:${{ github.sha }}
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed local/acs-pr-scan:${{ github.sha }}

      - name: Bicep compile validation
        run: |
          az bicep install
          az bicep build --file infra/dev/main.bicep
          az bicep build --file infra/uat/main.bicep
          az bicep build --file infra/prod/main.bicep

      - name: IaC policy scan
        run: checkov -d infra --quiet --compact --framework bicep
