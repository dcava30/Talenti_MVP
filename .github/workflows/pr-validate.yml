name: pr-validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce conventional PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          regex='^(feat|fix|perf|refactor|docs|ci|chore)(\([^)]+\))?!?: .+'

          if [[ ! "$PR_TITLE" =~ $regex ]]; then
            echo "Pull request titles must follow Conventional Commits."
            echo "Received: $PR_TITLE"
            echo "Example: feat(release): add release manifest upload"
            exit 1
          fi

  frontend:
    needs: validate-pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    needs: validate-pr-title
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: talenti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d talenti_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/talenti_test
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend

      - name: Run backend tests
        run: pytest backend/tests -q
