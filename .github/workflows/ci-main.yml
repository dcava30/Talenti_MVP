name: ci-main

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Enforce no-axios policy
        run: npm run check:no-axios

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push immutable images
        run: |
          set -euo pipefail
          BACKEND_TAG="$ACR_NAME.azurecr.io/talenti/backend:${GITHUB_SHA}"
          ACS_TAG="$ACR_NAME.azurecr.io/talenti/acs-worker:${GITHUB_SHA}"

          docker build -t "$BACKEND_TAG" backend
          docker build -t "$ACS_TAG" python-acs-service

          docker push "$BACKEND_TAG"
          docker push "$ACS_TAG"

      - name: Resolve pushed image digests
        run: |
          set -euo pipefail
          backend_digest=$(az acr manifest show-metadata --registry "$ACR_NAME" --name "talenti/backend:${GITHUB_SHA}" --query digest -o tsv)
          acs_digest=$(az acr manifest show-metadata --registry "$ACR_NAME" --name "talenti/acs-worker:${GITHUB_SHA}" --query digest -o tsv)

          echo "BACKEND_IMAGE=$ACR_NAME.azurecr.io/talenti/backend@${backend_digest}" >> "$GITHUB_ENV"
          echo "ACS_IMAGE=$ACR_NAME.azurecr.io/talenti/acs-worker@${acs_digest}" >> "$GITHUB_ENV"
          echo "BACKEND_DIGEST=${backend_digest}" >> "$GITHUB_ENV"
          echo "ACS_DIGEST=${acs_digest}" >> "$GITHUB_ENV"

          cat <<EOF > image-manifest.json
          {
            "git_sha": "${GITHUB_SHA}",
            "backend_image": "$ACR_NAME.azurecr.io/talenti/backend@${backend_digest}",
            "acs_worker_image": "$ACR_NAME.azurecr.io/talenti/acs-worker@${acs_digest}"
          }
          EOF

      - name: Generate SBOMs
        run: |
          set -euo pipefail
          SYFT_VERSION="1.25.1"
          SYFT_ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          SYFT_CHECKSUMS="syft_${SYFT_VERSION}_checksums.txt"
          SYFT_BASE_URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"

          curl -sSfL "${SYFT_BASE_URL}/${SYFT_ARCHIVE}" -o "${SYFT_ARCHIVE}"
          curl -sSfL "${SYFT_BASE_URL}/${SYFT_CHECKSUMS}" -o "${SYFT_CHECKSUMS}"
          awk "/ ${SYFT_ARCHIVE}\$/ {print; found=1} END {exit found ? 0 : 1}" "${SYFT_CHECKSUMS}" | sha256sum -c -

          tar -xzf "${SYFT_ARCHIVE}" syft
          install -m 0755 syft /usr/local/bin/syft

          syft "${BACKEND_IMAGE}" -o spdx-json > sbom-backend.spdx.json
          syft "${ACS_IMAGE}" -o spdx-json > sbom-acs-worker.spdx.json

      - name: Scan published images (high/critical gate)
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.69.3"
          TRIVY_ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          TRIVY_CHECKSUMS="trivy_${TRIVY_VERSION}_checksums.txt"
          TRIVY_BASE_URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"

          curl -sSfL "${TRIVY_BASE_URL}/${TRIVY_ARCHIVE}" -o "${TRIVY_ARCHIVE}"
          curl -sSfL "${TRIVY_BASE_URL}/${TRIVY_CHECKSUMS}" -o "${TRIVY_CHECKSUMS}"
          awk "/ ${TRIVY_ARCHIVE}\$/ {print; found=1} END {exit found ? 0 : 1}" "${TRIVY_CHECKSUMS}" | sha256sum -c -

          tar -xzf "${TRIVY_ARCHIVE}" trivy
          install -m 0755 trivy /usr/local/bin/trivy

          trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "${BACKEND_IMAGE}"
          trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "${ACS_IMAGE}"

      - name: Install cosign
        uses: sigstore/cosign-installer@1aa8e0f2454b781fbf0fbf306a4c9533a0c57409

      - name: Sign images (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${BACKEND_IMAGE}"
          cosign sign "${ACS_IMAGE}"

      - name: Attest backend image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-name: ${{ env.ACR_NAME }}.azurecr.io/talenti/backend
          subject-digest: ${{ env.BACKEND_DIGEST }}
          push-to-registry: true

      - name: Attest ACS image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-name: ${{ env.ACR_NAME }}.azurecr.io/talenti/acs-worker
          subject-digest: ${{ env.ACS_DIGEST }}
          push-to-registry: true

      - name: Upload CI evidence artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-main-evidence-${{ github.sha }}
          path: |
            image-manifest.json
            sbom-backend.spdx.json
            sbom-acs-worker.spdx.json
