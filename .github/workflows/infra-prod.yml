name: infra-prod

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/prod/**"
      - "infra/modules/**"
      - ".github/workflows/infra-prod.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    if: vars.ENABLE_NON_DEV_DEPLOYS == 'true'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      FRONTEND_STORAGE_ACCOUNT: ${{ vars.FRONTEND_STORAGE_ACCOUNT }}
      FRONTEND_HOSTING_MODE: ${{ vars.FRONTEND_HOSTING_MODE }}
      FRONTEND_HOST_NAME: ${{ vars.FRONTEND_HOST_NAME }}
      FRONT_DOOR_PROFILE_NAME: ${{ vars.FRONT_DOOR_PROFILE_NAME }}
      FRONT_DOOR_ENDPOINT_NAME: ${{ vars.FRONT_DOOR_ENDPOINT_NAME }}
      APPLICATION_GATEWAY_NAME: ${{ vars.APPLICATION_GATEWAY_NAME }}
      APPLICATION_GATEWAY_PUBLIC_IP_NAME: ${{ vars.APPLICATION_GATEWAY_PUBLIC_IP_NAME }}
      FRONTEND_ALLOWED_CIDRS: ${{ vars.FRONTEND_ALLOWED_CIDRS }}
      BACKEND_APP: ${{ vars.BACKEND_APP }}
      BACKEND_WORKER_APP: ${{ vars.BACKEND_WORKER_APP }}
      MODEL1_APP: ${{ vars.MODEL1_APP }}
      MODEL2_APP: ${{ vars.MODEL2_APP }}
      ACS_WORKER_APP: ${{ vars.ACS_WORKER_APP }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: az extension add --name containerapp --upgrade

      - name: Resolve frontend hosting mode
        run: |
          RESOLVED_MODE="${FRONTEND_HOSTING_MODE:-storage-frontdoor}"
          echo "FRONTEND_HOSTING_MODE_RESOLVED=$RESOLVED_MODE" >> "$GITHUB_ENV"

      - name: Validate infra inputs
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_LOCATION
            AZURE_RESOURCE_GROUP
            ACR_NAME
            KEY_VAULT_NAME
            FRONTEND_STORAGE_ACCOUNT
            BACKEND_APP
            BACKEND_WORKER_APP
            MODEL1_APP
            MODEL2_APP
            ACS_WORKER_APP
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          done

          if [[ -z "${{ vars.ALERT_EMAIL_ADDRESS }}" ]]; then
            echo "Missing required environment variable: ALERT_EMAIL_ADDRESS"
            exit 1
          fi

          case "$FRONTEND_HOSTING_MODE_RESOLVED" in
            storage-frontdoor)
              if [[ -z "${FRONT_DOOR_PROFILE_NAME:-}" || -z "${FRONT_DOOR_ENDPOINT_NAME:-}" ]]; then
                echo "FRONT_DOOR_PROFILE_NAME and FRONT_DOOR_ENDPOINT_NAME are required for storage-frontdoor mode."
                exit 1
              fi
              ;;
            storage-appgateway)
              if [[ -z "${APPLICATION_GATEWAY_NAME:-}" || -z "${APPLICATION_GATEWAY_PUBLIC_IP_NAME:-}" || -z "${FRONTEND_HOST_NAME:-}" ]]; then
                echo "APPLICATION_GATEWAY_NAME, APPLICATION_GATEWAY_PUBLIC_IP_NAME, and FRONTEND_HOST_NAME are required for storage-appgateway mode."
                exit 1
              fi
              if [[ -z "${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_DATA }}" || -z "${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PASSWORD }}" ]]; then
                echo "APP_GATEWAY_SSL_CERTIFICATE_DATA and APP_GATEWAY_SSL_CERTIFICATE_PASSWORD secrets are required for storage-appgateway mode."
                exit 1
              fi
              ;;
            *)
              echo "Unsupported FRONTEND_HOSTING_MODE: $FRONTEND_HOSTING_MODE_RESOLVED"
              exit 1
              ;;
          esac

      - name: Ensure resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Render frontend CIDR parameters
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("FRONTEND_ALLOWED_CIDRS", "") or "[]"
          try:
              cidrs = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"FRONTEND_ALLOWED_CIDRS must be a JSON array string: {exc}") from exc

          if not isinstance(cidrs, list) or not all(isinstance(item, str) for item in cidrs):
              raise SystemExit("FRONTEND_ALLOWED_CIDRS must be a JSON array of CIDR strings.")

          Path("infra/prod/frontend-allowed-cidrs.parameters.json").write_text(
              json.dumps({"frontendAllowedCidrs": {"value": cidrs}}),
              encoding="utf-8",
          )
          PY

      - name: Deploy bicep
        run: |
          deploy_args=(
            --resource-group "$AZURE_RESOURCE_GROUP"
            --template-file infra/prod/main.bicep
            --parameters @infra/prod/parameters.prod.json
            --parameters @infra/prod/frontend-allowed-cidrs.parameters.json
            --parameters frontendHostingMode="$FRONTEND_HOSTING_MODE_RESOLVED"
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
            --parameters alertEmailAddress="${{ vars.ALERT_EMAIL_ADDRESS }}"
          )

          if [[ "$FRONTEND_HOSTING_MODE_RESOLVED" == "storage-frontdoor" ]]; then
            deploy_args+=(
              --parameters frontDoorProfileName="$FRONT_DOOR_PROFILE_NAME"
              --parameters frontDoorEndpointName="$FRONT_DOOR_ENDPOINT_NAME"
            )
          else
            deploy_args+=(
              --parameters applicationGatewayName="$APPLICATION_GATEWAY_NAME"
              --parameters applicationGatewayPublicIpName="$APPLICATION_GATEWAY_PUBLIC_IP_NAME"
              --parameters applicationGatewayFrontendHostName="$FRONTEND_HOST_NAME"
              --parameters applicationGatewaySslCertificateData="${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_DATA }}"
              --parameters applicationGatewaySslCertificatePassword="${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PASSWORD }}"
            )
          fi

          az deployment group create "${deploy_args[@]}"

      - name: Enable static website hosting
        run: |
          FRONTEND_STORAGE_KEY=$(az storage account keys list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --account-name "$FRONTEND_STORAGE_ACCOUNT" \
            --query "[0].value" \
            -o tsv)

          az storage blob service-properties update \
            --account-name "$FRONTEND_STORAGE_ACCOUNT" \
            --account-key "$FRONTEND_STORAGE_KEY" \
            --static-website true \
            --index-document index.html \
            --404-document index.html

      - name: Assign AcrPull and Key Vault Secrets User roles
        run: |
          ACR_ID=$(az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)
          KV_ID=$(az keyvault show --name "$KEY_VAULT_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)
          for APP in "$BACKEND_APP" "$BACKEND_WORKER_APP" "$MODEL1_APP" "$MODEL2_APP" "$ACS_WORKER_APP"; do
            PRINCIPAL_ID=$(az containerapp show --name "$APP" --resource-group "$AZURE_RESOURCE_GROUP" --query identity.principalId -o tsv)
            if [ -n "$PRINCIPAL_ID" ]; then
              az role assignment create --assignee-object-id "$PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$ACR_ID" || true
              az role assignment create --assignee-object-id "$PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role "Key Vault Secrets User" --scope "$KV_ID" || true
            fi
          done
