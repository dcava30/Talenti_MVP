name: pr-fast-quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-fast-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce conventional PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          regex='^(feat|fix|perf|refactor|docs|ci|chore)(\([^)]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $regex ]]; then
            echo "Pull request titles must follow Conventional Commits."
            echo "Received: $PR_TITLE"
            echo "Example: feat(release): add release manifest upload"
            exit 1
          fi

  frontend:
    needs: validate-pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    needs: validate-pr-title
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: talenti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d talenti_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/talenti_test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
          python -m pip install pytest-cov

      - name: Run backend tests with coverage threshold
        run: |
          pytest backend/tests -q --cov=app --cov-report=term-missing --cov-fail-under=70

      - name: Run migration execution check
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          JWT_SECRET: test-secret
        run: python backend/scripts/run_migrations.py

  acs-service:
    needs: validate-pr-title
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: talenti_acs_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d talenti_acs_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/talenti_acs_test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install ACS dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-acs-service/requirements.txt
          python -m pip install pytest-cov

      - name: Run ACS tests with coverage threshold
        working-directory: python-acs-service
        run: |
          pytest tests -q --cov=app --cov-report=term-missing --cov-fail-under=65
