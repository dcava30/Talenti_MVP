name: infra-dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/dev/**"
      - "infra/modules/**"
      - ".github/workflows/infra-dev.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      BACKEND_APP: ${{ vars.BACKEND_APP }}
      STATIC_WEB_APP_NAME: ${{ vars.STATIC_WEB_APP_NAME }}
      DEV_FRONTEND_ORIGIN: ${{ vars.DEV_FRONTEND_ORIGIN }}
      BACKEND_ALLOWED_CIDRS: ${{ vars.BACKEND_ALLOWED_CIDRS }}
    environment: dev
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: |
          az extension add --name containerapp --upgrade
          az extension add --name staticwebapp --upgrade

      - name: Validate infra inputs
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_LOCATION
            AZURE_RESOURCE_GROUP
            ACR_NAME
            KEY_VAULT_NAME
            BACKEND_APP
            STATIC_WEB_APP_NAME
            DEV_FRONTEND_ORIGIN
            BACKEND_ALLOWED_CIDRS
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          done

      - name: Ensure resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Render backend CIDR parameters
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ["BACKEND_ALLOWED_CIDRS"]
          try:
              cidrs = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"BACKEND_ALLOWED_CIDRS must be a JSON array string: {exc}") from exc

          if not isinstance(cidrs, list) or not all(isinstance(item, str) for item in cidrs):
              raise SystemExit("BACKEND_ALLOWED_CIDRS must be a JSON array of CIDR strings.")

          Path("infra/dev/backend-allowed-cidrs.parameters.json").write_text(
              json.dumps({"backendAllowedCidrs": {"value": cidrs}}),
              encoding="utf-8",
          )
          PY

      - name: Deploy bicep
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/dev/main.bicep \
            --parameters @infra/dev/parameters.dev.json \
            --parameters @infra/dev/backend-allowed-cidrs.parameters.json \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

      - name: Configure Static Web App custom hostname
        run: |
          set -euo pipefail

          FRONTEND_HOST=$(printf '%s' "$DEV_FRONTEND_ORIGIN" | sed -E 's#^https?://([^/]+).*$#\1#')
          if [[ -z "$FRONTEND_HOST" || "$FRONTEND_HOST" == "$DEV_FRONTEND_ORIGIN" ]]; then
            echo "DEV_FRONTEND_ORIGIN must be an absolute URL, got: $DEV_FRONTEND_ORIGIN"
            exit 1
          fi

          if ! az staticwebapp hostname show --name "$STATIC_WEB_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --hostname "$FRONTEND_HOST" > /dev/null 2>&1; then
            az staticwebapp hostname set \
              --name "$STATIC_WEB_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --hostname "$FRONTEND_HOST"
          fi

      - name: Assign AcrPull and Key Vault Secrets User roles
        run: |
          ACR_ID=$(az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)
          KV_ID=$(az keyvault show --name "$KEY_VAULT_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)
          PRINCIPAL_ID=$(az containerapp show --name "$BACKEND_APP" --resource-group "$AZURE_RESOURCE_GROUP" --query identity.principalId -o tsv)
          if [ -n "$PRINCIPAL_ID" ]; then
            az role assignment create --assignee-object-id "$PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$ACR_ID" || true
            az role assignment create --assignee-object-id "$PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role "Key Vault Secrets User" --scope "$KV_ID" || true
          fi
